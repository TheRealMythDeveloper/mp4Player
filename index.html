<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>MP4 Player</title>
<style>
body {
  margin: 0;
  background: #121212;
  color: white;
  font-family: sans-serif;
}

.container {
  display: flex;
  height: 100vh;
}

.video-area {
  flex: 3;
  display: flex;
  align-items: center;
  justify-content: center;
  background: black;
}

video {
  max-width: 90%;
  max-height: 90%;
}

.sidebar {
  flex: 1;
  background: #1e1e1e;
  padding: 20px;
  overflow-y: auto;
}

button {
  padding: 10px;
  margin-bottom: 15px;
  width: 100%;
  background: #333;
  color: white;
  border: none;
  cursor: pointer;
  border-radius: 6px;
}

button:hover {
  background: #444;
}

ul {
  list-style: none;
  padding: 0;
}

li {
  padding: 8px;
  cursor: pointer;
  border-radius: 5px;
}

li:hover {
  background: #333;
}
</style>
</head>
<body>

<div class="container">

  <div class="video-area">
    <video id="videoPlayer" controls></video>
  </div>

  <div class="sidebar">
    <button id="pickFolder">📂 Choose Video Folder</button>
    <ul id="playlist"></ul>
  </div>

</div>

<script>
const videoPlayer = document.getElementById("videoPlayer");
const playlist = document.getElementById("playlist");
const pickFolderBtn = document.getElementById("pickFolder");

let videoFiles = [];

pickFolderBtn.addEventListener("click", async () => {
  try {
    const dirHandle = await window.showDirectoryPicker();
    videoFiles = [];
    playlist.innerHTML = "";

    for await (const entry of dirHandle.values()) {
      if (entry.kind === "file" && entry.name.endsWith(".mp4")) {
        videoFiles.push(entry);
      }
    }

    videoFiles.forEach((fileHandle, index) => {
      const li = document.createElement("li");
      li.textContent = fileHandle.name;
      li.onclick = () => loadVideo(index);
      playlist.appendChild(li);
    });

  } catch (err) {
    console.log("Folder selection cancelled or failed.", err);
  }
});

async function loadVideo(index) {
  const file = await videoFiles[index].getFile();
  const url = URL.createObjectURL(file);
  videoPlayer.src = url;
  videoPlayer.play();
}
</script>

</body>
</html>
