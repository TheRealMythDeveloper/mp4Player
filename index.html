<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Video Player</title>

  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    .container {
      display: flex;
      height: 100vh;
    }

    .video-area {
      flex: 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: black;
    }

    video {
      max-width: 90%;
      max-height: 80%;
    }

    .controls {
      margin-top: 10px;
    }

    .controls button {
      margin: 5px;
      padding: 10px;
    }

    .sidebar {
      flex: 1;
      background: #1e1e1e;
      padding: 20px;
      overflow-y: auto;
      color: white;
    }

    button {
      width: 100%;
      margin-bottom: 10px;
      padding: 10px;
      background: #333;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }

    button:hover {
      background: #444;
    }

    ul {
      list-style: none;
      padding: 0;
    }

    li {
      padding: 8px;
      cursor: pointer;
      border-radius: 5px;
    }

    li:hover {
      background: #333;
    }

    li.active {
      background: #555;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- Video Section -->
  <div class="video-area">
    <video id="videoPlayer" controls></video>

    <div class="controls">
      <button onclick="prev()">⏮ Prev</button>
      <button onclick="next()">⏭ Next</button>
      <button onclick="shuffle()">🔀 Shuffle</button>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="sidebar">
    <button id="pickFolder">📂 Choose Video Folder</button>
    <ul id="playlist"></ul>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
